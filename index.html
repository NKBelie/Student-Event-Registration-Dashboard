<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Event Registration Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f4ede7] text-[#2d1a12]">
    <section class="sticky top-0 z-50 border-b border-[#7b4a32]/30 bg-[#4b2412] text-white shadow-lg">
        <nav class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-2xl font-bold">Event Tracker Dashboard</h1>
            </div>

            <input
                type="text"
                id="searchInput"
                placeholder="Search events..."
                class="w-full rounded-lg border border-[#c8a892] bg-[#fffaf5] px-4 py-3 text-[#2d1a12] outline-none transition focus:border-[#a56a43] focus:ring-2 focus:ring-[#e4cbb8] sm:max-w-xs"
            />
        </nav>
    </section>

    <header class="bg-gradient-to-r from-[#4b2412] via-[#7b3f1d] to-[#b37a50] text-white">
        <div class="mx-auto max-w-7xl px-4 py-14">
            <div class="max-w-3xl">
                <h2 class="text-4xl font-bold leading-tight md:text-5xl">
                    Student Event Registration System
                </h2>
                <p class="mt-4 max-w-2xl text-lg text-[#fff4ea]">
                    Register students, manage attendance, and track seats with a clear event overview.
                </p>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8">
        <section class="grid grid-cols-1 gap-4 md:grid-cols-3">
            <div class="rounded-lg border border-[#e4cbb8] bg-[#fffaf5] p-6 shadow-sm">
                <p class="text-sm font-semibold uppercase tracking-wide text-[#8b6f61]">Total Events</p>
                <p id="totalEvents" class="mt-3 text-4xl font-bold text-[#4b2412]">0</p>
            </div>

            <div class="rounded-lg border border-[#e4cbb8] bg-[#fffaf5] p-6 shadow-sm">
                <p class="text-sm font-semibold uppercase tracking-wide text-[#8b6f61]">Registered Students</p>
                <p id="totalRegistered" class="mt-3 text-4xl font-bold text-[#4b2412]">0</p>
            </div>

            <div class="rounded-lg border border-[#e4cbb8] bg-[#fffaf5] p-6 shadow-sm">
                <p class="text-sm font-semibold uppercase tracking-wide text-[#8b6f61]">Available Seats</p>
                <p id="totalSeats" class="mt-3 text-4xl font-bold text-[#4b2412]">0</p>
            </div>
        </section>

        <section class="mt-8 rounded-lg border border-[#e4cbb8] bg-[#fffaf5] p-6 shadow-sm">
            <div class="mb-5 flex flex-col gap-1">
                <h2 class="text-2xl font-bold">Add New Event</h2>
                <p class="text-sm text-[#7b3f1d]">Create an event and start tracking registration seats.</p>
            </div>

            <form id="eventForm" class="grid gap-4 md:grid-cols-3">
                <input
                    type="text"
                    id="title"
                    placeholder="Event Title"
                    class="rounded-lg border border-[#c8a892] bg-white px-4 py-3 outline-none transition focus:border-[#a56a43] focus:ring-2 focus:ring-[#e4cbb8]"
                />

                <select
                    id="category"
                    class="rounded-lg border border-[#c8a892] bg-white px-4 py-3 outline-none transition focus:border-[#a56a43] focus:ring-2 focus:ring-[#e4cbb8]"
                >
                    <option value="">Select Category</option>
                    <option value="Technology">Technology</option>
                    <option value="Business">Business</option>
                    <option value="Education">Education</option>
                    <option value="Sports">Sports</option>
                    <option value="Arts">Arts</option>
                    <option value="Culture">Culture</option>
                    <option value="Music">Music</option>
                    <option value="Community">Community</option>
                    <option value="Leadership">Leadership</option>
                    <option value="Social">Social</option>
                </select>

                <input
                    type="number"
                    id="seats"
                    placeholder="Seats"
                    class="rounded-lg border border-[#c8a892] bg-white px-4 py-3 outline-none transition focus:border-[#a56a43] focus:ring-2 focus:ring-[#e4cbb8]"
                />

                <button
                    type="submit"
                    class="rounded-lg bg-[#6b351b] px-4 py-3 font-semibold text-white shadow-sm transition hover:bg-[#4b2412] md:col-span-3"
                >
                    Add Event
                </button>
            </form>
        </section>

        <section class="mt-8">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="text-2xl font-bold">Events</h2>
            </div>

            <div id="eventContainer" class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
